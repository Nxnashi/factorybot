<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — учёт производства</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f4f2ee);
    --surface: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1c1e);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --accent: var(--tg-theme-button-color, #c4622d);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --line: #e2ddd4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .tab {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--text); border-color: var(--accent); }
  section { display: none; padding: 16px; }
  section.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .card .row1 { font-weight: 700; font-size: 14px; }
  .card .row2 { font-size: 12px; color: var(--hint); margin-top: 2px; }
  .card .actions { display: flex; gap: 8px; margin-top: 8px; }
  .card .actions button {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text);
  }
  .card .actions button.danger { color: #b3372c; border-color: #b3372c; }

  form.inline {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  form.inline label {
    display: block;
    font-size: 12px;
    color: var(--hint);
    margin: 8px 0 4px;
  }
  form.inline input, form.inline select {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  form.inline button {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 700;
  }
  .stage-checkboxes {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stage-checkbox-item {
    display: flex !important;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin: 0 !important;
  }
  .stage-checkbox-item input { width: auto !important; }

  .export-form input[type="date"] { margin-bottom: 8px; }
  .state-screen { padding: 60px 24px; text-align: center; color: var(--hint); }

  .stage-card .row1 { font-size: 15px; margin-bottom: 10px; }
  .employee-block {
    padding: 10px 0;
    border-top: 1px solid var(--line);
  }
  .employee-block:first-of-type { border-top: none; }
  .employee-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .employee-time {
    font-size: 11px;
    font-weight: 400;
    color: var(--hint);
  }
  .item-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 3px 0 3px 10px;
    color: var(--text);
  }
  .item-line span:last-child { font-weight: 700; }
  .item-line.total { padding-left: 0; }
  .item-line .right { display: flex; align-items: center; gap: 8px; font-weight: 400; }
  .item-line .entry-time { font-size: 11px; color: var(--hint); font-weight: 400; }
  .item-line .del-btn {
    border: none;
    background: none;
    color: #b3372c;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
  }
  .stage-total {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
  }

  .balance-card .row1 { margin-bottom: 8px; }
  .balance-stage-line {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
    border-top: 1px solid var(--line);
  }
  .balance-stage-line:first-of-type { border-top: none; }
  .balance-stage-line span:last-child { font-weight: 700; }
  .balance-deltas-block {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .balance-delta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .balance-delta.ok { background: rgba(60, 160, 90, 0.12); color: #3ca05a; }
  .balance-delta.warn { background: rgba(179, 55, 44, 0.12); color: #b3372c; }
  .balance-delta.over { background: rgba(196, 98, 45, 0.12); color: var(--accent); }
  .balance-delta span:last-child { font-weight: 700; }
</style>
</head>
<body>

<div id="app"><div class="state-screen">Загрузка…</div></div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

function getTelegramId() {
  const fromTg = tg?.initDataUnsafe?.user?.id;
  if (fromTg) return String(fromTg);
  const params = new URLSearchParams(location.search);
  return params.get('tid');
}

const telegramId = getTelegramId();
const app = document.getElementById('app');

function authHeaders() {
  return { 'Content-Type': 'application/json', 'x-telegram-id': telegramId };
}

async function boot() {
  if (!telegramId) {
    app.innerHTML = `<div class="state-screen">Не удалось определить пользователя.</div>`;
    return;
  }
  const stagesRes = await fetch('/api/admin/stages', { headers: authHeaders() });
  if (stagesRes.status === 403 || stagesRes.status === 401) {
    app.innerHTML = `<div class="state-screen">Доступ только для администраторов.<br>Твой ID: <b>${telegramId}</b></div>`;
    return;
  }
  const stages = await stagesRes.json();
  render(stages);
}

function render(stages) {
  app.innerHTML = `
    <div class="tabs">
      <div class="tab active" data-tab="shifts">Смены</div>
      <div class="tab" data-tab="balance">Баланс</div>
      <div class="tab" data-tab="users">Сотрудники</div>
      <div class="tab" data-tab="nom">Номенклатура</div>
      <div class="tab" data-tab="export">Экспорт</div>
    </div>
    <section class="active" id="tab-shifts"></section>
    <section id="tab-balance"></section>
    <section id="tab-users"></section>
    <section id="tab-nom"></section>
    <section id="tab-export"></section>
  `;

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
  });

  renderShiftsTab(stages);
  renderBalanceTab(stages);
  renderUsersTab(stages);
  renderNomTab();
  renderExportTab();
}

// --- Баланс между этапами ---
async function renderBalanceTab(stages) {
  const el = document.getElementById('tab-balance');
  const today = new Date().toISOString().slice(0, 10);

  el.innerHTML = `
    <form class="inline export-form" id="balanceFilterForm">
      <label>С даты</label>
      <input type="date" name="date_from" value="${today}" required>
      <label>По дату</label>
      <input type="date" name="date_to" value="${today}" required>
      <button type="submit">Показать</button>
    </form>
    <div id="balanceResult"></div>
  `;

  const GRADE_LABELS = { '1': 'с1', '2': 'с2', '3': 'с3', brak: 'брак' };

  async function loadBalance(dateFrom, dateTo) {
    const resultEl = document.getElementById('balanceResult');
    resultEl.innerHTML = `<div class="state-screen">Загрузка…</div>`;
    const data = await (await fetch(`/api/admin/balance?date_from=${dateFrom}&date_to=${dateTo}`, { headers: authHeaders() })).json();

    if (data.length === 0) {
      resultEl.innerHTML = `<div class="state-screen">Нет данных за этот период</div>`;
      return;
    }

    resultEl.innerHTML = data.map(nom => {
      const stagesRow = nom.per_stage
        .filter(s => s.total > 0)
        .map(s => {
          const gradesStr = s.grades
            ? ' (' + Object.entries(s.grades).map(([g, q]) => `${GRADE_LABELS[g] || g}: ${q}`).join(', ') + ')'
            : '';
          return `<div class="balance-stage-line"><span>${s.title}</span><span>${s.total}${gradesStr}</span></div>`;
        }).join('');

      const deltasRow = nom.deltas.map(d => {
        const fromTitle = stages.find(s => s.code === d.from_stage)?.title || d.from_stage;
        const toTitle = stages.find(s => s.code === d.to_stage)?.title || d.to_stage;
        const cls = d.delta === 0 ? 'ok' : (d.delta > 0 ? 'warn' : 'over');
        return `
          <div class="balance-delta ${cls}">
            <span>${fromTitle} → ${toTitle}</span>
            <span>${d.delta === 0 ? 'сходится' : (d.delta > 0 ? 'не хватает ' + d.delta : 'лишнее ' + Math.abs(d.delta))}</span>
          </div>
        `;
      }).join('');

      return `
        <div class="card balance-card">
          <div class="row1">${nom.nomenclature_name}</div>
          ${stagesRow}
          ${deltasRow ? `<div class="balance-deltas-block">${deltasRow}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  document.getElementById('balanceFilterForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    loadBalance(fd.get('date_from'), fd.get('date_to'));
  });

  loadBalance(today, today);
}

// --- Смены (просмотр без экспорта) ---
async function renderShiftsTab(stages) {
  const el = document.getElementById('tab-shifts');
  const today = new Date().toISOString().slice(0, 10);

  el.innerHTML = `
    <form class="inline export-form" id="shiftsFilterForm">
      <label>С даты</label>
      <input type="date" name="date_from" value="${today}" required>
      <label>По дату</label>
      <input type="date" name="date_to" value="${today}" required>
      <button type="submit">Показать</button>
    </form>
    <div id="shiftsResult"></div>
  `;

  async function loadShifts(dateFrom, dateTo) {
    const resultEl = document.getElementById('shiftsResult');
    resultEl.innerHTML = `<div class="state-screen">Загрузка…</div>`;
    const rows = await (await fetch(`/api/admin/entries?date_from=${dateFrom}&date_to=${dateTo}`, { headers: authHeaders() })).json();

    if (rows.length === 0) {
      resultEl.innerHTML = `<div class="state-screen">Пока пусто — никто ничего не вносил за этот период</div>`;
      return;
    }

    // Группировка: этап -> сотрудник -> [{nomenclature, grade, quantity}]
    const byStage = {};
    for (const r of rows) {
      byStage[r.stage] = byStage[r.stage] || {};
      byStage[r.stage][r.employee_name] = byStage[r.stage][r.employee_name] || [];
      byStage[r.stage][r.employee_name].push(r);
    }

    const GRADE_LABELS = { '1': 'Сорт 1', '2': 'Сорт 2', '3': 'Сорт 3', brak: 'Брак' };

    const html = stages
      .filter(s => byStage[s.code])
      .map(stage => {
        const employees = byStage[stage.code];

        // Итого по этапу — суммируем по номенклатуре(+сорт)
        const stageTotals = {};
        Object.values(employees).flat().forEach(r => {
          const key = r.nomenclature_name + (r.grade ? ' · ' + (GRADE_LABELS[r.grade] || r.grade) : '');
          stageTotals[key] = (stageTotals[key] || 0) + r.quantity;
        });

        const employeeBlocks = Object.entries(employees).map(([name, items]) => {
          const rowsHtml = items.map(r => `
            <div class="item-line" data-entry-id="${r.id}">
              <span>${r.nomenclature_name}${r.grade ? ' · ' + (GRADE_LABELS[r.grade] || r.grade) : ''} — ${r.quantity}</span>
              <span class="right">
                <span class="entry-time">${r.created_at.slice(11, 16)}</span>
                <button class="del-btn" data-del-entry="${r.id}" title="Удалить запись">✕</button>
              </span>
            </div>
          `).join('');
          const lastTime = items[items.length - 1].created_at.slice(11, 16);
          return `
            <div class="employee-block">
              <div class="employee-name">${name} <span class="employee-time">посл. запись ${lastTime}</span></div>
              ${rowsHtml}
            </div>
          `;
        }).join('');

        return `
          <div class="card stage-card">
            <div class="row1">${stage.title}</div>
            ${employeeBlocks}
            <div class="stage-total">
              <div class="row2" style="margin-bottom:4px;">Итого по этапу</div>
              ${Object.entries(stageTotals).map(([k, v]) => `
                <div class="item-line total"><span>${k}</span><span>${v}</span></div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

    resultEl.innerHTML = html || `<div class="state-screen">Пока пусто</div>`;

    resultEl.querySelectorAll('[data-del-entry]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Удалить эту запись?')) return;
        await fetch(`/api/admin/entries/${btn.dataset.delEntry}`, { method: 'DELETE', headers: authHeaders() });
        loadShifts(dateFrom, dateTo);
      });
    });
  }

  document.getElementById('shiftsFilterForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    loadShifts(fd.get('date_from'), fd.get('date_to'));
  });

  loadShifts(today, today);
}

// --- Сотрудники ---
async function renderUsersTab(stages) {
  const el = document.getElementById('tab-users');
  const users = await (await fetch('/api/admin/users', { headers: authHeaders() })).json();

  el.innerHTML = `
    <form class="inline" id="userForm">
      <label>Telegram ID сотрудника</label>
      <input name="telegram_id" required placeholder="Например 123456789">
      <label>Имя</label>
      <input name="full_name" required placeholder="Иван Иванов">
      <label>Этапы (можно выбрать несколько)</label>
      <div class="stage-checkboxes">
        ${stages.map(s => `
          <label class="stage-checkbox-item">
            <input type="checkbox" name="stage" value="${s.code}"> ${s.title}
          </label>
        `).join('')}
      </div>
      <label><input type="checkbox" name="is_admin" style="width:auto;display:inline-block;margin-right:6px;">Администратор</label>
      <button type="submit">Добавить / обновить</button>
    </form>
    <div id="usersList">
      ${users.map(u => {
        const userStageCodes = u.stage.split(',').map(s => s.trim()).filter(Boolean);
        const userStageTitles = userStageCodes.map(code => stages.find(s => s.code === code)?.title || code).join(', ');
        return `
        <div class="card">
          <div class="row1">${u.full_name} ${u.is_admin ? '⭐' : ''}</div>
          <div class="row2">ID: ${u.telegram_id} · ${userStageTitles}</div>
          <div class="actions">
            <button class="danger" data-del-user="${u.telegram_id}">Удалить</button>
          </div>
        </div>
      `;
      }).join('') || '<div class="state-screen">Сотрудников пока нет</div>'}
    </div>
  `;

  el.querySelector('#userForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const selectedStages = fd.getAll('stage');
    if (selectedStages.length === 0) {
      alert('Выбери хотя бы один этап');
      return;
    }
    await fetch('/api/admin/users', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        telegram_id: fd.get('telegram_id'),
        full_name: fd.get('full_name'),
        stage: selectedStages.join(','),
        is_admin: fd.get('is_admin') === 'on',
      }),
    });
    renderUsersTab(stages);
  });

  el.querySelectorAll('[data-del-user]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch(`/api/admin/users/${btn.dataset.delUser}`, { method: 'DELETE', headers: authHeaders() });
      renderUsersTab(stages);
    });
  });
}

// --- Номенклатура ---
async function renderNomTab() {
  const el = document.getElementById('tab-nom');
  const items = await (await fetch('/api/admin/nomenclature', { headers: authHeaders() })).json();

  el.innerHTML = `
    <form class="inline" id="nomForm">
      <label>Название позиции</label>
      <input name="name" required placeholder="Например: Бачок">
      <label>Единица измерения</label>
      <input name="unit" value="шт">
      <button type="submit">Добавить позицию</button>
    </form>
    <div id="nomList">
      ${items.map(n => `
        <div class="card">
          <div class="row1">${n.name} ${n.active ? '' : '(скрыто)'}</div>
          <div class="row2">${n.unit}</div>
          <div class="actions">
            <button data-toggle-nom="${n.id}" data-active="${n.active}">${n.active ? 'Скрыть' : 'Показать'}</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  el.querySelector('#nomForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    await fetch('/api/admin/nomenclature', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ name: fd.get('name'), unit: fd.get('unit') || 'шт' }),
    });
    renderNomTab();
  });

  el.querySelectorAll('[data-toggle-nom]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const active = btn.dataset.active === '1';
      await fetch(`/api/admin/nomenclature/${btn.dataset.toggleNom}`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ active: !active }),
      });
      renderNomTab();
    });
  });
}

// --- Экспорт ---
function renderExportTab() {
  const el = document.getElementById('tab-export');
  const today = new Date().toISOString().slice(0, 10);
  el.innerHTML = `
    <form class="inline export-form" id="exportForm">
      <label>С даты</label>
      <input type="date" name="date_from" value="${today}" required>
      <label>По дату</label>
      <input type="date" name="date_to" value="${today}" required>
      <button type="submit">Скачать Excel</button>
    </form>
  `;
  el.querySelector('#exportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const url = `/api/export?date_from=${fd.get('date_from')}&date_to=${fd.get('date_to')}`;
    const res = await fetch(url, { headers: authHeaders() });
    if (!res.ok) { alert('Ошибка экспорта'); return; }
    const blob = await res.blob();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `otchet_${fd.get('date_from')}_${fd.get('date_to')}.xlsx`;
    link.click();
  });
}

boot();
</script>
</body>
</html>
