<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Учёт производства</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f4f2ee);
    --surface: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1c1e);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --accent: var(--tg-theme-button-color, #c4622d);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --line: #e2ddd4;
    --brak: #b3372c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding-bottom: 160px;
  }
  header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 4px;
  }
  header h1 {
    font-size: 19px;
    margin: 0 0 2px;
    font-weight: 700;
  }
  header .who {
    font-size: 13px;
    color: var(--hint);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .switch-stage-btn {
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--hint);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 8px;
  }
  .drum-change-btn {
    border: 1px solid var(--accent);
    background: var(--bg);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 10px;
  }
  .batch-progress-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .batch-progress-card.empty {
    color: var(--hint);
    font-size: 13px;
    text-align: center;
    padding: 16px;
  }
  .batch-submit-bar {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .submit-btn.secondary {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .picker-hint {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 14px;
  }
  .stage-pick-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }
  .log-stage {
    font-weight: 400;
    color: var(--hint);
    font-size: 12px;
  }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .photo-upload-btn {
    display: block;
    text-align: center;
    padding: 24px 12px;
    border: 2px dashed var(--line);
    border-radius: 12px;
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  #photoPreview {
    display: block;
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    max-height: 320px;
    object-fit: cover;
  }
  .photo-caption-input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
  }
  main { padding: 14px; }
  .date-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .date-row label { font-size: 13px; color: var(--hint); }
  .date-row input[type="date"] {
    border: none;
    background: transparent;
    font-size: 15px;
    color: var(--text);
    font-weight: 600;
    text-align: right;
  }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .item-card .name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .item-card .name .unit {
    font-size: 12px;
    color: var(--hint);
    font-weight: 400;
  }
  .qty-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .qty-row input[type="number"] {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
  }
  .grade-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .grade-cell label {
    display: block;
    font-size: 11px;
    color: var(--hint);
    margin-bottom: 4px;
    text-align: center;
  }
  .grade-cell.brak label { color: var(--brak); }
  .grade-cell input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 4px;
    font-size: 15px;
    text-align: center;
    background: var(--bg);
    color: var(--text);
  }
  .grade-cell.brak input { border-color: var(--brak); }

  .submit-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .submit-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    font-weight: 700;
  }
  .submit-btn:disabled { opacity: 0.5; }

  .today-log {
    margin-top: 22px;
  }
  .today-log h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--hint);
    margin-bottom: 8px;
  }
  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .log-row .t { color: var(--hint); font-size: 12px; }
  .log-row .right { display: flex; align-items: center; gap: 10px; }
  .log-row .del-btn {
    border: none;
    background: none;
    color: var(--brak);
    font-size: 18px;
    line-height: 1;
    padding: 4px 6px;
  }

  .state-screen {
    padding: 60px 24px;
    text-align: center;
    color: var(--hint);
    font-size: 14px;
    line-height: 1.5;
  }
  .state-screen b { color: var(--text); }
  .toast {
    position: fixed;
    top: 14px; left: 14px; right: 14px;
    background: var(--text);
    color: var(--bg);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    transform: translateY(-80px);
    transition: transform 0.25s ease;
    z-index: 50;
  }
  .toast.show { transform: translateY(0); }
  .date-dmy-hint {
    font-size: 11px;
    color: var(--hint);
    margin-left: 6px;
    white-space: nowrap;
  }
  .search-row {
    margin-bottom: 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 6px 0;
    z-index: 10;
  }
  .search-row input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
  }
  .roster-check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 15px;
  }
  .roster-check-item input { width: 18px; height: 18px; }
</style>
</head>
<body>

<div id="app">
  <div class="state-screen">Загрузка…</div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

// Узбекский/русский формат даты (ДД.ММ.ГГГГ) рядом с нативным полем — на некоторых
// телефонах системная локаль показывает американский формат внутри самого пикера,
// это не лечится из веб-страницы, поэтому подписываем явно рядом.
function formatDMY(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}.${m}.${y}`;
}
function attachDateHints(root) {
  root.querySelectorAll('input[type="date"]').forEach(input => {
    if (input.dataset.hintAttached) return;
    input.dataset.hintAttached = '1';
    const hint = document.createElement('span');
    hint.className = 'date-dmy-hint';
    hint.textContent = formatDMY(input.value);
    input.insertAdjacentElement('afterend', hint);
    input.addEventListener('input', () => { hint.textContent = formatDMY(input.value); });
  });
}
new MutationObserver(() => attachDateHints(document.body)).observe(document.body, { childList: true, subtree: true });
attachDateHints(document.body);

const API = '';
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function getTelegramId() {
  const fromTg = tg?.initDataUnsafe?.user?.id;
  if (fromTg) return String(fromTg);
  // Фолбэк для теста вне Telegram — можно открыть index.html?tid=12345 в браузере
  const params = new URLSearchParams(location.search);
  return params.get('tid');
}

let currentMe = null;
let currentStage = null;
let currentNomenclature = null;

async function init() {
  const telegramId = getTelegramId();
  if (!telegramId) {
    app.innerHTML = `<div class="state-screen">Не удалось определить пользователя.<br>Открой приложение через кнопку в боте.</div>`;
    return;
  }

  const meRes = await fetch(`${API}/api/me/${telegramId}`);
  if (meRes.status === 404) {
    app.innerHTML = `<div class="state-screen">
      Ты ещё не зарегистрирован.<br><br>
      Твой ID: <b>${telegramId}</b><br>
      Передай его администратору для назначения этапа.
    </div>`;
    return;
  }
  const me = await meRes.json();
  currentMe = me;

  if (!me.stages || me.stages.length === 0) {
    app.innerHTML = `<div class="state-screen">Тебе пока не назначен ни один этап.<br>Обратись к администратору.</div>`;
    return;
  }

  const nomRes = await fetch(`${API}/api/nomenclature`);
  currentNomenclature = await nomRes.json();

  if (me.stages.length === 1) {
    currentStage = me.stages[0];
    if (currentStage.form_type === 'photo') {
      renderPhotoForm(me, currentStage);
    } else if (currentStage.form_type === 'materials') {
      renderDrumPicker(me, currentStage);
    } else if (currentStage.is_roster_stage) {
      renderShiftGate(me, currentStage);
    } else {
      renderForm(me, currentStage, currentNomenclature, null, null);
      loadToday(telegramId);
    }
  } else {
    renderStagePicker(me);
  }
}

function renderStagePicker(me) {
  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>Выбор этапа</h1>
      <div class="who">${me.full_name}</div>
    </header>
    <main>
      <div class="picker-hint">За какой участок вносишь данные сейчас?</div>
      ${me.stages.map(s => `
        <button class="stage-pick-btn" data-stage-code="${s.code}">${s.title}</button>
      `).join('')}
    </main>
  `;
  app.querySelectorAll('[data-stage-code]').forEach(btn => {
    btn.addEventListener('click', () => {
      const stage = me.stages.find(s => s.code === btn.dataset.stageCode);
      currentStage = stage;
      if (stage.form_type === 'photo') {
        renderPhotoForm(me, stage);
      } else if (stage.form_type === 'materials') {
        renderDrumPicker(me, stage);
      } else if (stage.is_roster_stage) {
        renderShiftGate(me, stage);
      } else {
        renderForm(me, stage, currentNomenclature, null, null);
        loadToday(me.telegram_id);
      }
    });
  });
}

// --- Смена старшего (для ROSTER_STAGES): проверяем статус, ведём либо на открытие, либо на список сотрудников ---
async function renderShiftGate(me, stage) {
  const today = new Date().toISOString().slice(0, 10);
  app.innerHTML = `<div class="state-screen">Загрузка…</div>`;
  const res = await fetch(`${API}/api/shift-status?telegram_id=${me.telegram_id}&stage=${stage.code}&entry_date=${today}`);
  const data = await res.json();

  if (!data.shift || data.shift.status !== 'open') {
    renderOpenShiftScreen(me, stage);
  } else {
    renderEmployeePicker(me, stage, data.shift, data.employees);
  }
}

async function renderOpenShiftScreen(me, stage) {
  const roster = await (await fetch(`${API}/api/roster?stage=${stage.code}`)).json();
  const switchLink = me.stages.length > 1
    ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>`
    : '';

  if (roster.length === 0) {
    app.innerHTML = `
      <header>
        <div class="eyebrow">Учёт производства</div>
        <h1>${stage.title}</h1>
        <div class="who">${me.full_name} ${switchLink}</div>
      </header>
      <div class="state-screen">На этом этапе пока нет ни одного сотрудника в ростере.<br>Обратись к администратору, чтобы добавил состав цеха.</div>
    `;
    const switchBtn = document.getElementById('switchStageBtn');
    if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));
    return;
  }

  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name} ${switchLink}</div>
    </header>
    <main>
      <div class="picker-hint">Смена ещё не открыта. Выбери, кто сегодня работает на этом участке, и открой смену.</div>
      <div id="rosterList">
        ${roster.map(e => `
          <label class="roster-check-item">
            <input type="checkbox" value="${e.id}"> ${e.full_name}
          </label>
        `).join('')}
      </div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn" id="openShiftBtn">Открыть смену</button>
    </div>
  `;

  document.getElementById('openShiftBtn').addEventListener('click', async () => {
    const checked = Array.from(document.querySelectorAll('#rosterList input:checked')).map(i => Number(i.value));
    if (checked.length === 0) {
      showToast('Выбери хотя бы одного сотрудника');
      return;
    }
    const names = roster.filter(e => checked.includes(e.id)).map(e => e.full_name).join(', ');
    if (!confirm(`Открыть смену на этапе «${stage.title}»?\n\nСостав: ${names}\n\nПосле открытия состав сменить нельзя — только закрыть смену и открыть новую.`)) {
      return;
    }
    const today = new Date().toISOString().slice(0, 10);
    try {
      const res = await fetch(`${API}/api/shift/open`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telegram_id: me.telegram_id, entry_date: today, stage: stage.code, employee_ids: checked }),
      });
      const data = await res.json();
      if (data.ok) {
        showToast('Смена открыта');
        tg?.HapticFeedback?.notificationOccurred('success');
        renderEmployeePicker(me, stage, data.shift, roster.filter(e => checked.includes(e.id)));
      } else if (data.error === 'day_closed') {
        showToast('Этот день уже закрыт. Обратись к администратору.');
      } else if (data.error === 'already_open') {
        renderShiftGate(me, stage);
      } else {
        showToast('Ошибка при открытии смены');
      }
    } catch (e) {
      showToast('Ошибка сети');
    }
  });

  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));
}

function renderEmployeePicker(me, stage, shift, employees) {
  const switchLink = me.stages.length > 1
    ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>`
    : '';

  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name} ${switchLink}</div>
    </header>
    <main>
      <div class="picker-hint">Смена открыта. Выбери сотрудника, чтобы внести его выработку.</div>
      ${employees.map(e => `
        <button class="stage-pick-btn" data-emp-id="${e.id}" data-emp-name="${e.full_name}">${e.full_name}</button>
      `).join('')}
      <div class="today-log" id="todayLog"></div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn secondary" id="closeShiftBtn">Закрыть смену</button>
    </div>
  `;

  app.querySelectorAll('[data-emp-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      renderForm(me, stage, currentNomenclature, Number(btn.dataset.empId), btn.dataset.empName, shift);
    });
  });

  document.getElementById('closeShiftBtn').addEventListener('click', () => {
    if (!confirm(`Закрыть смену на этапе «${stage.title}»?\n\nПосле закрытия внести данные за сегодня на этом этапе будет нельзя.`)) {
      return;
    }
    (async () => {
      try {
        const res = await fetch(`${API}/api/shift/close`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id: me.telegram_id, shift_id: shift.id }),
        });
        const data = await res.json();
        if (data.ok) {
          showToast('Смена закрыта');
          tg?.HapticFeedback?.notificationOccurred('success');
          if (me.stages.length > 1) renderStagePicker(me); else renderShiftGate(me, stage);
        } else {
          showToast('Не удалось закрыть смену');
        }
      } catch (e) {
        showToast('Ошибка сети');
      }
    })();
  });

  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));

  loadToday(me.telegram_id);
}

function renderPhotoForm(me, stage) {
  const today = new Date().toISOString().slice(0, 10);
  const switchLink = me.stages.length > 1
    ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>`
    : '';

  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name} ${switchLink}</div>
    </header>
    <main>
      <div class="date-row">
        <label>Дата</label>
        <input type="date" id="entryDate" value="${today}" max="${today}">
      </div>
      <div class="photo-card">
        <label class="photo-upload-btn" id="photoUploadLabel">
          <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none;">
          <span id="photoUploadText">📷 Сфотографировать накладную</span>
        </label>
        <img id="photoPreview" style="display:none;">
        <input type="text" id="photoCaption" placeholder="Комментарий (поставщик, № накладной) — необязательно" class="photo-caption-input">
      </div>
      <div class="today-log" id="todayPhotosLog"></div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn" id="photoSubmitBtn" disabled>Отправить фото</button>
    </div>
  `;

  const photoInput = document.getElementById('photoInput');
  const preview = document.getElementById('photoPreview');
  const submitBtn = document.getElementById('photoSubmitBtn');
  let selectedFile = null;

  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('photoUploadText').textContent = '📷 Заменить фото';
    submitBtn.disabled = false;
  });

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Отправка…';

    const fd = new FormData();
    fd.append('telegram_id', me.telegram_id);
    fd.append('entry_date', document.getElementById('entryDate').value);
    fd.append('caption', document.getElementById('photoCaption').value);
    fd.append('photo', selectedFile);

    try {
      const res = await fetch(`${API}/api/intake-photo`, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.ok) {
        showToast('Фото отправлено');
        tg?.HapticFeedback?.notificationOccurred('success');
        selectedFile = null;
        photoInput.value = '';
        preview.style.display = 'none';
        document.getElementById('photoCaption').value = '';
        document.getElementById('photoUploadText').textContent = '📷 Сфотографировать накладную';
        loadTodayPhotos(me.telegram_id);
      } else if (data.error === 'day_closed') {
        showToast('Этот день уже закрыт. Обратись к администратору.');
      } else {
        showToast('Ошибка при отправке');
      }
    } catch (e) {
      showToast('Ошибка сети');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Отправить фото';
    }
  });

  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));

  loadTodayPhotos(me.telegram_id);
}

async function renderDrumPicker(me, stage) {
  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name}</div>
    </header>
    <main>
      <div class="picker-hint">Какой барабан используешь?</div>
      <button class="stage-pick-btn" data-drum="1">Барабан 1</button>
      <button class="stage-pick-btn" data-drum="2">Барабан 2</button>
      <button class="stage-pick-btn" data-drum="3">Барабан 3</button>
    </main>
  `;
  app.querySelectorAll('[data-drum]').forEach(btn => {
    btn.addEventListener('click', () => startBatch(me, stage, Number(btn.dataset.drum)));
  });
}

async function startBatch(me, stage, drumNumber) {
  const today = new Date().toISOString().slice(0, 10);
  try {
    const res = await fetch(`${API}/api/mixing-batch/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: me.telegram_id, entry_date: today, stage: stage.code, drum_number: drumNumber }),
    });
    const data = await res.json();
    if (data.error === 'day_closed') {
      showToast('Этот день уже закрыт. Обратись к администратору.');
      return;
    }
    renderMaterialsForm(me, stage, data.batch, data.materials);
  } catch (e) {
    showToast('Ошибка сети');
  }
}

async function refreshBatch(me, stage) {
  const res = await fetch(`${API}/api/mixing-batch/start`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ telegram_id: me.telegram_id, entry_date: currentBatch.entry_date, stage: stage.code, drum_number: currentBatch.drum_number }),
  });
  const data = await res.json();
  renderMaterialsForm(me, stage, data.batch, data.materials);
}

let currentBatch = null;

async function renderMaterialsForm(me, stage, batch, alreadyAdded) {
  currentBatch = batch;
  const materials = await (await fetch(`${API}/api/materials?stage=${stage.code}`)).json();

  const itemsHtml = materials.map(item => {
    const searchText = (item.name + ' ' + (item.article || '')).toLowerCase();
    return `
      <div class="item-card" data-id="${item.id}" data-grade="false" data-search="${searchText}">
        <div class="name">${item.name}${item.article ? ` (${item.article})` : ''} <span class="unit">${item.unit}</span></div>
        <div class="qty-row">
          <input type="number" min="0" inputmode="numeric" placeholder="Количество" data-qty>
        </div>
      </div>
    `;
  }).join('');

  const switchLink = me.stages.length > 1
    ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>`
    : '';

  const alreadyAddedHtml = alreadyAdded.length > 0
    ? `
      <div class="batch-progress-card">
        <div class="row2" style="margin-bottom:6px;">Уже добавлено в этот замес</div>
        ${alreadyAdded.map(m => `<div class="item-line"><span>${m.material_name}</span><span>${m.quantity}</span></div>`).join('')}
      </div>
    `
    : `<div class="batch-progress-card empty">Пока ничего не добавлено в этот замес</div>`;

  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name} ${switchLink}</div>
    </header>
    <main>
      <div class="date-row">
        <label>Барабан</label>
        <button class="drum-change-btn" id="drumChangeBtn">Барабан ${batch.drum_number} · сменить</button>
      </div>
      ${alreadyAddedHtml}
      <div class="search-row">
        <input type="text" id="itemSearch" placeholder="🔍 Поиск по названию или артикулу" autocomplete="off">
      </div>
      <div id="itemsList">${itemsHtml}</div>
    </main>
    <div class="submit-bar batch-submit-bar">
      <button class="submit-btn secondary" id="addMaterialsBtn">Добавить сырьё в замес</button>
      <button class="submit-btn" id="finishBatchBtn">Указать выход и завершить →</button>
    </div>
  `;

  document.getElementById('drumChangeBtn').addEventListener('click', () => renderDrumPicker(me, stage));

  document.getElementById('itemSearch').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('#itemsList .item-card').forEach(card => {
      const match = !q || card.dataset.search.includes(q);
      card.style.display = match ? '' : 'none';
    });
  });

  document.getElementById('addMaterialsBtn').addEventListener('click', () => addMaterialsToBatch(me, stage));
  document.getElementById('finishBatchBtn').addEventListener('click', () => renderBatchOutputForm(me, stage, batch, alreadyAdded));

  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));
}

async function addMaterialsToBatch(me, stage) {
  const btn = document.getElementById('addMaterialsBtn');
  const cards = document.querySelectorAll('.item-card');
  const items = [];

  cards.forEach(card => {
    const id = Number(card.dataset.id);
    const input = card.querySelector('[data-qty]');
    const qty = Number(input.value || 0);
    if (qty > 0) items.push({ material_id: id, quantity: qty });
  });

  if (items.length === 0) {
    showToast('Заполни хотя бы одну позицию');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Сохранение…';

  try {
    const res = await fetch(`${API}/api/mixing-batch/add-materials`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ batch_id: currentBatch.id, telegram_id: me.telegram_id, items }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`Добавлено: ${data.saved} позиций`);
      tg?.HapticFeedback?.notificationOccurred('success');
      await refreshBatch(me, stage);
    } else if (data.error === 'day_closed') {
      showToast('Этот день уже закрыт. Обратись к администратору.');
    } else {
      showToast('Ошибка при сохранении');
    }
  } catch (e) {
    showToast('Ошибка сети');
  }
}

function renderBatchOutputForm(me, stage, batch, alreadyAdded) {
  if (alreadyAdded.length === 0) {
    showToast('Сначала добавь сырьё в замес');
    return;
  }
  app.innerHTML = `
    <header>
      <div class="eyebrow">Учёт производства</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name}</div>
    </header>
    <main>
      <div class="batch-progress-card">
        <div class="row2" style="margin-bottom:6px;">Внесено сырья в замес (барабан ${batch.drum_number})</div>
        ${alreadyAdded.map(m => `<div class="item-line"><span>${m.material_name}</span><span>${m.quantity}</span></div>`).join('')}
      </div>
      <div class="photo-card">
        <label style="display:block; margin-bottom:8px; color:var(--hint); font-size:13px;">Сколько фактически получилось на выходе? (кг)</label>
        <input type="number" min="0" inputmode="numeric" id="outputQty" placeholder="Количество, кг" class="photo-caption-input">
      </div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn" id="completeBatchBtn">Завершить замес</button>
    </div>
  `;

  document.getElementById('completeBatchBtn').addEventListener('click', async () => {
    const btn = document.getElementById('completeBatchBtn');
    const outputQty = Number(document.getElementById('outputQty').value || 0);
    if (outputQty <= 0) {
      showToast('Укажи количество на выходе');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Отправка…';
    try {
      const res = await fetch(`${API}/api/mixing-batch/complete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ batch_id: batch.id, telegram_id: me.telegram_id, output_quantity: outputQty }),
      });
      const data = await res.json();
      if (data.ok) {
        showToast('Замес завершён');
        tg?.HapticFeedback?.notificationOccurred('success');
        if (me.stages.length > 1) {
          renderStagePicker(me);
        } else {
          renderDrumPicker(me, stage);
        }
      } else {
        showToast('Ошибка: ' + (data.error || 'неизвестная'));
      }
    } catch (e) {
      showToast('Ошибка сети');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Завершить замес';
    }
  });
}

async function loadTodayPhotos(telegramId) {
  const res = await fetch(`${API}/api/today-photos/${telegramId}`);
  const rows = await res.json();
  const el = document.getElementById('todayPhotosLog');
  if (!el) return;
  if (rows.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `
    <h2>Отправлено сегодня (${rows.length})</h2>
    ${rows.map(r => `
      <div class="log-row">
        <span>📷 ${r.caption || 'Накладная'}</span>
        <span class="t">${r.created_at.slice(11, 16)}</span>
      </div>
    `).join('')}
  `;
}

function renderForm(me, stage, nomenclature, employeeId, employeeName, shift) {
  const today = new Date().toISOString().slice(0, 10);
  const gradeOptions = stage.grade_options;

  const itemsHtml = nomenclature.map(item => {
    const searchText = (item.name + ' ' + (item.article || '')).toLowerCase();
    if (gradeOptions && gradeOptions.length > 0) {
      return `
        <div class="item-card" data-id="${item.id}" data-grade="true" data-search="${searchText}">
          <div class="name">${item.name}${item.article ? ` (${item.article})` : ''} <span class="unit">${item.unit}</span></div>
          <div class="grade-grid" style="grid-template-columns: repeat(${gradeOptions.length}, 1fr);">
            ${gradeOptions.map(g => `
              <div class="grade-cell ${g.countsAsGood === false ? 'brak' : ''}">
                <label>${g.label}</label>
                <input type="number" min="0" inputmode="numeric" data-grade-code="${g.code}" placeholder="0">
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    return `
      <div class="item-card" data-id="${item.id}" data-grade="false" data-search="${searchText}">
        <div class="name">${item.name}${item.article ? ` (${item.article})` : ''} <span class="unit">${item.unit}</span></div>
        <div class="qty-row">
          <input type="number" min="0" inputmode="numeric" placeholder="Количество" data-qty>
        </div>
      </div>
    `;
  }).join('');

  const isRoster = !!employeeId;
  const backBtn = isRoster
    ? `<button class="switch-stage-btn" id="backToEmployeesBtn">← К списку сотрудников</button>`
    : (me.stages.length > 1 ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>` : '');

  app.innerHTML = `
    <header>
      <div class="eyebrow">${isRoster ? `Вносишь за: ${employeeName}` : 'Учёт производства'}</div>
      <h1>${stage.title}</h1>
      <div class="who">${me.full_name} ${backBtn}</div>
    </header>
    <main>
      <div class="date-row">
        <label>Дата смены</label>
        <input type="date" id="entryDate" value="${today}" max="${today}">
      </div>
      <div class="search-row">
        <input type="text" id="itemSearch" placeholder="🔍 Поиск по названию или артикулу" autocomplete="off">
      </div>
      <div id="itemsList">${itemsHtml}</div>
      <div class="today-log" id="todayLog"></div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn" id="submitBtn">Сохранить${isRoster ? ` за ${employeeName}` : ''}</button>
    </div>
  `;

  document.getElementById('itemSearch').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('#itemsList .item-card').forEach(card => {
      const match = !q || card.dataset.search.includes(q);
      card.style.display = match ? '' : 'none';
    });
  });

  document.getElementById('submitBtn').addEventListener('click', () => submit(me, stage, employeeId, employeeName, shift));

  const backToEmpBtn = document.getElementById('backToEmployeesBtn');
  if (backToEmpBtn) backToEmpBtn.addEventListener('click', () => renderShiftGate(me, stage));

  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));
}

async function submit(me, stage, employeeId, employeeName, shift) {
  const btn = document.getElementById('submitBtn');
  const entryDate = document.getElementById('entryDate').value;
  const cards = document.querySelectorAll('.item-card');
  const items = [];

  cards.forEach(card => {
    const id = Number(card.dataset.id);
    if (card.dataset.grade === 'true') {
      card.querySelectorAll('[data-grade-code]').forEach(input => {
        const qty = Number(input.value || 0);
        if (qty > 0) {
          items.push({ nomenclature_id: id, quantity: qty, grade: input.dataset.gradeCode });
        }
      });
    } else {
      const input = card.querySelector('[data-qty]');
      const qty = Number(input.value || 0);
      if (qty > 0) {
        items.push({ nomenclature_id: id, quantity: qty });
      }
    }
  });

  if (items.length === 0) {
    showToast('Заполни хотя бы одну позицию');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Отправка…';

  try {
    const res = await fetch(`${API}/api/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        telegram_id: me.telegram_id,
        entry_date: entryDate,
        stage: stage.code,
        employee_id: employeeId || undefined,
        items,
      }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`Сохранено: ${data.saved} позиций`);
      tg?.HapticFeedback?.notificationOccurred('success');
      document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
      loadToday(me.telegram_id);
    } else if (data.error === 'day_closed') {
      showToast('Этот день уже закрыт. Обратись к администратору.');
    } else if (data.error === 'shift_not_open') {
      showToast('Смена уже закрыта. Обратись к администратору.');
    } else {
      showToast('Ошибка при сохранении');
    }
  } catch (e) {
    showToast('Ошибка сети');
  } finally {
    btn.disabled = false;
    btn.textContent = `Сохранить${employeeId ? ` за ${employeeName}` : ''}`;
  }
}

async function loadToday(telegramId) {
  const res = await fetch(`${API}/api/today/${telegramId}`);
  const rows = await res.json();
  const el = document.getElementById('todayLog');
  if (!el) return;
  if (rows.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `
    <h2>Внесено сегодня</h2>
    ${rows.map(r => `
      <div class="log-row" data-entry-id="${r.id}">
        <span>${r.employee_name ? `<b>${r.employee_name}:</b> ` : ''}${r.nomenclature_name}${r.grade ? ' · ' + r.grade : ''} — ${r.quantity} <span class="log-stage">(${r.stage_title}${r.drum_number ? ', барабан ' + r.drum_number : ''})</span></span>
        <span class="right">
          <span class="t">${r.created_at.slice(11, 16)}</span>
          <button class="del-btn" data-del-entry="${r.id}" title="Удалить запись">✕</button>
        </span>
      </div>
    `).join('')}
  `;

  el.querySelectorAll('[data-del-entry]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Удалить эту запись?')) return;
      try {
        const res = await fetch(`${API}/api/entries/${btn.dataset.delEntry}?telegram_id=${telegramId}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.ok) {
          showToast('Запись удалена');
          tg?.HapticFeedback?.notificationOccurred('success');
          loadToday(telegramId);
        } else {
          showToast('Не удалось удалить');
        }
      } catch (e) {
        showToast('Ошибка сети');
      }
    });
  });
}

init();
</script>
</body>
</html>
