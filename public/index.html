<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Учёт производства</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f4f2ee);
    --surface: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1c1e);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --accent: var(--tg-theme-button-color, #c4622d);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --line: #e2ddd4;
    --brak: #b3372c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding-bottom: 100px;
  }
  header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 4px;
  }
  header h1 {
    font-size: 19px;
    margin: 0 0 2px;
    font-weight: 700;
  }
  header .who {
    font-size: 13px;
    color: var(--hint);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .switch-stage-btn {
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--hint);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 8px;
  }
  .picker-hint {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 14px;
  }
  .stage-pick-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }
  .log-stage {
    font-weight: 400;
    color: var(--hint);
    font-size: 12px;
  }

  .photo-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .photo-upload-btn {
    display: block;
    text-align: center;
    padding: 24px 12px;
    border: 2px dashed var(--line);
    border-radius: 12px;
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  #photoPreview {
    display: block;
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    max-height: 320px;
    object-fit: cover;
  }
  .photo-caption-input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
  }
  main { padding: 14px; }
  .date-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 14px;
  }
  .date-row label { font-size: 13px; color: var(--hint); }
  .date-row input[type="date"] {
    border: none;
    background: transparent;
    font-size: 15px;
    color: var(--text);
    font-weight: 600;
    text-align: right;
  }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .item-card .name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .item-card .name .unit {
    font-size: 12px;
    color: var(--hint);
    font-weight: 400;
  }
  .qty-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .qty-row input[type="number"] {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
  }
  .grade-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .grade-cell label {
    display: block;
    font-size: 11px;
    color: var(--hint);
    margin-bottom: 4px;
    text-align: center;
  }
  .grade-cell.brak label { color: var(--brak); }
  .grade-cell input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 4px;
    font-size: 15px;
    text-align: center;
    background: var(--bg);
    color: var(--text);
  }
  .grade-cell.brak input { border-color: var(--brak); }

  .submit-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .submit-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    font-weight: 700;
  }
  .submit-btn:disabled { opacity: 0.5; }

  .today-log {
    margin-top: 22px;
  }
  .today-log h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--hint);
    margin-bottom: 8px;
  }
  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .log-row .t { color: var(--hint); font-size: 12px; }
  .log-row .right { display: flex; align-items: center; gap: 10px; }
  .log-row .del-btn {
    border: none;
    background: none;
    color: var(--brak);
    font-size: 18px;
    line-height: 1;
    padding: 4px 6px;
  }

  .state-screen {
    padding: 60px 24px;
    text-align: center;
    color: var(--hint);
    font-size: 14px;
    line-height: 1.5;
  }
  .state-screen b { color: var(--text); }
  .toast {
    position: fixed;
    top: 14px; left: 14px; right: 14px;
    background: var(--text);
    color: var(--bg);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    transform: translateY(-80px);
    transition: transform 0.25s ease;
    z-index: 50;
  }
  .toast.show { transform: translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div class="state-screen">Загрузка…</div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

const API = '';
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function getTelegramId() {
  const fromTg = tg?.initDataUnsafe?.user?.id;
  if (fromTg) return String(fromTg);
  // Фолбэк для теста вне Telegram — можно открыть index.html?tid=12345 в браузере
  const params = new URLSearchParams(location.search);
  return params.get('tid');
}

const GRADES = [
  { code: '1', label: 'Сорт 1' },
  { code: '2', label: 'Сорт 2' },
  { code: '3', label: 'Сорт 3' },
  { code: 'brak', label: 'Брак' },
];

let currentMe = null;
let currentStage = null;
let currentNomenclature = null;

async function init() {
  const telegramId = getTelegramId();
  if (!telegramId) {
    app.innerHTML = `<div class="state-screen">Не удалось определить пользователя.<br>Открой приложение через кнопку в боте.</div>`;
    return;
  }

  const meRes = await fetch(`${API}/api/me/${telegramId}`);
  if (meRes.status === 404) {
    app.innerHTML = `<div class="state-screen">
      Ты ещё не зарегистрирован.<br><br>
      Твой ID: <b>${telegramId}</b><br>
      Передай его администратору для назначения этапа.
    </div>`;
    return;
  }
  const me = await meRes.json();
  currentMe = me;

  if (!me.stages || me.stages.length === 0) {
    app.innerHTML = `<div class="state-screen">Тебе пока не назначен ни один этап.<br>Обратись к администратору.</div>`;
    return;
  }

  const nomRes = await fetch(`${API}/api/nomenclature`);
  currentNomenclature = await nomRes.json();

  if (me.stages.length === 1) {
    currentStage = me.stages[0];
    if (currentStage.form_type === 'photo') {
      renderPhotoForm(me, currentStage);
    } else {
      renderForm(me, currentStage, currentNomenclature);
      loadToday(telegramId);
    }
  } else {
    renderStagePicker(me);
  }
}

function renderStagePicker(me) {
  app.innerHTML = `
    <header>
      <div class="eyebrow">Выбор этапа</div>
      <h1>Учёт производства</h1>
      <div class="who">${me.full_name}</div>
    </header>
    <main>
      <div class="picker-hint">За какой участок вносишь данные сейчас?</div>
      ${me.stages.map(s => `
        <button class="stage-pick-btn" data-stage-code="${s.code}">${s.title}</button>
      `).join('')}
    </main>
  `;
  app.querySelectorAll('[data-stage-code]').forEach(btn => {
    btn.addEventListener('click', () => {
      const stage = me.stages.find(s => s.code === btn.dataset.stageCode);
      currentStage = stage;
      if (stage.form_type === 'photo') {
        renderPhotoForm(me, stage);
      } else {
        renderForm(me, stage, currentNomenclature);
        loadToday(me.telegram_id);
      }
    });
  });
}

function renderPhotoForm(me, stage) {
  const today = new Date().toISOString().slice(0, 10);
  const switchLink = me.stages.length > 1
    ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>`
    : '';

  app.innerHTML = `
    <header>
      <div class="eyebrow">${stage.title}</div>
      <h1>Учёт производства</h1>
      <div class="who">${me.full_name} ${switchLink}</div>
    </header>
    <main>
      <div class="date-row">
        <label>Дата</label>
        <input type="date" id="entryDate" value="${today}" max="${today}">
      </div>
      <div class="photo-card">
        <label class="photo-upload-btn" id="photoUploadLabel">
          <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none;">
          <span id="photoUploadText">📷 Сфотографировать накладную</span>
        </label>
        <img id="photoPreview" style="display:none;">
        <input type="text" id="photoCaption" placeholder="Комментарий (поставщик, № накладной) — необязательно" class="photo-caption-input">
      </div>
      <div class="today-log" id="todayPhotosLog"></div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn" id="photoSubmitBtn" disabled>Отправить фото</button>
    </div>
  `;

  const photoInput = document.getElementById('photoInput');
  const preview = document.getElementById('photoPreview');
  const submitBtn = document.getElementById('photoSubmitBtn');
  let selectedFile = null;

  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('photoUploadText').textContent = '📷 Заменить фото';
    submitBtn.disabled = false;
  });

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Отправка…';

    const fd = new FormData();
    fd.append('telegram_id', me.telegram_id);
    fd.append('entry_date', document.getElementById('entryDate').value);
    fd.append('caption', document.getElementById('photoCaption').value);
    fd.append('photo', selectedFile);

    try {
      const res = await fetch(`${API}/api/intake-photo`, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.ok) {
        showToast('Фото отправлено');
        tg?.HapticFeedback?.notificationOccurred('success');
        selectedFile = null;
        photoInput.value = '';
        preview.style.display = 'none';
        document.getElementById('photoCaption').value = '';
        document.getElementById('photoUploadText').textContent = '📷 Сфотографировать накладную';
        loadTodayPhotos(me.telegram_id);
      } else if (data.error === 'day_closed') {
        showToast('Этот день уже закрыт. Обратись к администратору.');
      } else {
        showToast('Ошибка при отправке');
      }
    } catch (e) {
      showToast('Ошибка сети');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Отправить фото';
    }
  });

  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));

  loadTodayPhotos(me.telegram_id);
}

async function loadTodayPhotos(telegramId) {
  const res = await fetch(`${API}/api/today-photos/${telegramId}`);
  const rows = await res.json();
  const el = document.getElementById('todayPhotosLog');
  if (!el) return;
  if (rows.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `
    <h2>Отправлено сегодня (${rows.length})</h2>
    ${rows.map(r => `
      <div class="log-row">
        <span>📷 ${r.caption || 'Накладная'}</span>
        <span class="t">${r.created_at.slice(11, 16)}</span>
      </div>
    `).join('')}
  `;
}

function renderForm(me, stage, nomenclature) {
  const today = new Date().toISOString().slice(0, 10);

  const itemsHtml = nomenclature.map(item => {
    if (stage.needs_grade) {
      return `
        <div class="item-card" data-id="${item.id}" data-grade="true">
          <div class="name">${item.name} <span class="unit">${item.unit}</span></div>
          <div class="grade-grid">
            ${GRADES.map(g => `
              <div class="grade-cell ${g.code === 'brak' ? 'brak' : ''}">
                <label>${g.label}</label>
                <input type="number" min="0" inputmode="numeric" data-grade-code="${g.code}" placeholder="0">
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    return `
      <div class="item-card" data-id="${item.id}" data-grade="false">
        <div class="name">${item.name} <span class="unit">${item.unit}</span></div>
        <div class="qty-row">
          <input type="number" min="0" inputmode="numeric" placeholder="Количество" data-qty>
        </div>
      </div>
    `;
  }).join('');

  const switchLink = me.stages.length > 1
    ? `<button class="switch-stage-btn" id="switchStageBtn">Сменить этап ↺</button>`
    : '';

  app.innerHTML = `
    <header>
      <div class="eyebrow">${stage.title}</div>
      <h1>Учёт производства</h1>
      <div class="who">${me.full_name} ${switchLink}</div>
    </header>
    <main>
      <div class="date-row">
        <label>Дата смены</label>
        <input type="date" id="entryDate" value="${today}" max="${today}">
      </div>
      ${itemsHtml}
      <div class="today-log" id="todayLog"></div>
    </main>
    <div class="submit-bar">
      <button class="submit-btn" id="submitBtn">Отправить данные</button>
    </div>
  `;

  document.getElementById('submitBtn').addEventListener('click', () => submit(me, stage));
  const switchBtn = document.getElementById('switchStageBtn');
  if (switchBtn) switchBtn.addEventListener('click', () => renderStagePicker(me));
}

async function submit(me, stage) {
  const btn = document.getElementById('submitBtn');
  const entryDate = document.getElementById('entryDate').value;
  const cards = document.querySelectorAll('.item-card');
  const items = [];

  cards.forEach(card => {
    const id = Number(card.dataset.id);
    if (card.dataset.grade === 'true') {
      card.querySelectorAll('[data-grade-code]').forEach(input => {
        const qty = Number(input.value || 0);
        if (qty > 0) {
          items.push({ nomenclature_id: id, quantity: qty, grade: input.dataset.gradeCode });
        }
      });
    } else {
      const input = card.querySelector('[data-qty]');
      const qty = Number(input.value || 0);
      if (qty > 0) {
        items.push({ nomenclature_id: id, quantity: qty });
      }
    }
  });

  if (items.length === 0) {
    showToast('Заполни хотя бы одну позицию');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Отправка…';

  try {
    const res = await fetch(`${API}/api/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: me.telegram_id, entry_date: entryDate, stage: stage.code, items }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`Сохранено: ${data.saved} позиций`);
      tg?.HapticFeedback?.notificationOccurred('success');
      document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
      loadToday(me.telegram_id);
    } else if (data.error === 'day_closed') {
      showToast('Этот день уже закрыт. Обратись к администратору.');
    } else {
      showToast('Ошибка при сохранении');
    }
  } catch (e) {
    showToast('Ошибка сети');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Отправить данные';
  }
}

async function loadToday(telegramId) {
  const res = await fetch(`${API}/api/today/${telegramId}`);
  const rows = await res.json();
  const el = document.getElementById('todayLog');
  if (!el) return;
  if (rows.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `
    <h2>Внесено сегодня</h2>
    ${rows.map(r => `
      <div class="log-row" data-entry-id="${r.id}">
        <span>${r.nomenclature_name}${r.grade ? ' · ' + r.grade : ''} — ${r.quantity} <span class="log-stage">(${r.stage_title})</span></span>
        <span class="right">
          <span class="t">${r.created_at.slice(11, 16)}</span>
          <button class="del-btn" data-del-entry="${r.id}" title="Удалить запись">✕</button>
        </span>
      </div>
    `).join('')}
  `;

  el.querySelectorAll('[data-del-entry]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Удалить эту запись?')) return;
      try {
        const res = await fetch(`${API}/api/entries/${btn.dataset.delEntry}?telegram_id=${telegramId}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.ok) {
          showToast('Запись удалена');
          tg?.HapticFeedback?.notificationOccurred('success');
          loadToday(telegramId);
        } else {
          showToast('Не удалось удалить');
        }
      } catch (e) {
        showToast('Ошибка сети');
      }
    });
  });
}

init();
</script>
</body>
</html>
